# Netlify build config — Next.js 16 con export estático.
# Para deploy: conectá el repo en https://app.netlify.com y Netlify
# detecta este archivo automáticamente.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  # Next.js 16 + React 19 requieren Node ≥ 20.
  NODE_VERSION = "20"
  # Desactivar telemetría en el build remoto.
  NEXT_TELEMETRY_DISABLED = "1"

# Cache largo para los assets versionados de Next, donde el hash en el
# nombre del archivo invalida automáticamente.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers de seguridad básicos.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
